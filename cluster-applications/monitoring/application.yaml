apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 67.9.0
    helm:
      values: |
        prometheus:
          prometheusSpec:
            nodeSelector:
              node-role.kubernetes.io/control-plane: "true"
            tolerations:
              - key: CriticalAddonsOnly
                operator: Exists
                effect: NoExecute
        grafana:
          enabled: true
          persistence:
            enabled: false
          nodeSelector:
            node-role.kubernetes.io/control-plane: "true"
          tolerations:
            - key: CriticalAddonsOnly
              operator: Exists
              effect: NoExecute
          ingress:
            enabled: true
            ingressClassName: traefik
            hosts:
              - grafana.example.com
            tls:
              - secretName: grafana-tls
                hosts:
                  - grafana.example.com
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
        alertmanager:
          enabled: false
        prometheusOperator:
          nodeSelector:
            node-role.kubernetes.io/control-plane: "true"
          tolerations:
            - key: CriticalAddonsOnly
              operator: Exists
              effect: NoExecute
        kube-state-metrics:
          nodeSelector:
            node-role.kubernetes.io/control-plane: "true"
          tolerations:
            - key: CriticalAddonsOnly
              operator: Exists
              effect: NoExecute
        prometheus-node-exporter:
          tolerations:
            - key: CriticalAddonsOnly
              operator: Exists
              effect: NoExecute
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
